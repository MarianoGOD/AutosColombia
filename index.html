<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Autos Colombia</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; }
        .header { background-color: #004085; color: white; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 24px; }
        .container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 320px; }
        .card h3 { margin-top: 0; color: #333; border-bottom: 2px solid #f8f9fa; padding-bottom: 10px; }
        label { font-weight: bold; font-size: 14px; color: #555; }
        input, select { width: 100%; padding: 10px; margin: 8px 0 20px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 15px; color: white; transition: 0.3s; }
        .btn-in { background-color: #28a745; } .btn-in:hover { background-color: #218838; }
        .btn-out { background-color: #dc3545; } .btn-out:hover { background-color: #c82333; }
        .status { margin-top: 15px; padding: 10px; border-radius: 5px; font-size: 14px; display: none; }
        .status.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .status.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .stats { text-align: center; margin-top: 30px; font-size: 18px; color: #555; }
        #celdas-count { font-weight: bold; color: #004085; font-size: 22px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚗 Sistema de Gestión - Autos Colombia</h1>
        <p>Módulo de Operador: Entradas y Salidas</p>
    </div>

    <div class="container">
        <div class="card">
            <h3>Registrar Entrada</h3>
            <label>Placa del Vehículo</label>
            <input type="text" id="placaIn" placeholder="Ej. ABC-123" style="text-transform: uppercase;">
            
            <label>Novedades (Opcional)</label>
            <input type="text" id="novedad" placeholder="Rayones, golpes, etc.">
            
            <label>Celda Asignada</label>
            <select id="celdaIn">
                <option value="A1">Celda A1</option>
                <option value="A2">Celda A2</option>
                <option value="B1">Celda B1</option>
                <option value="B2">Celda B2</option>
            </select>

            <button class="btn-in" onclick="ingresar()">Validar y Registrar Ingreso</button>
            <div id="msgIn" class="status"></div>
        </div>

        <div class="card">
            <h3>Registrar Salida</h3>
            <label>Placa del Vehículo</label>
            <input type="text" id="placaOut" placeholder="Ej. ABC-123" style="text-transform: uppercase;">
            
            <button class="btn-out" onclick="salir()">Registrar Salida y Liberar</button>
            <div id="msgOut" class="status"></div>
        </div>
    </div>

    <div class="stats">
        Celdas Disponibles: <span id="celdas-count">50</span> / 50
    </div>

    <script>
        let celdasDisponibles = 50;

        function ingresar() {
            let placa = document.getElementById('placaIn').value.toUpperCase();
            let msgBox = document.getElementById('msgIn');
            
            if(placa === '') { 
                msgBox.className = 'status error';
                msgBox.innerHTML = '⚠️ Por favor ingrese la placa del vehículo.';
                return; 
            }
            if(celdasDisponibles <= 0) {
                msgBox.className = 'status error';
                msgBox.innerHTML = '⚠️ No hay celdas disponibles.';
                return;
            }

            celdasDisponibles--;
            document.getElementById('celdas-count').innerText = celdasDisponibles;
            msgBox.className = 'status success';
            msgBox.innerHTML = '✅ <b>Acceso Permitido.</b><br>Mensualidad activa validada.<br>Vehículo ' + placa + ' ingresado.';
            document.getElementById('placaIn').value = '';
            document.getElementById('novedad').value = '';
        }

        function salir() {
            let placa = document.getElementById('placaOut').value.toUpperCase();
            let msgBox = document.getElementById('msgOut');

            if(placa === '') { 
                msgBox.className = 'status error';
                msgBox.innerHTML = '⚠️ Por favor ingrese la placa del vehículo.';
                return; 
            }

            if(celdasDisponibles >= 50) {
                msgBox.className = 'status error';
                msgBox.innerHTML = '⚠️ El parqueadero ya está vacío.';
                return;
            }

            celdasDisponibles++;
            document.getElementById('celdas-count').innerText = celdasDisponibles;
            msgBox.className = 'status success';
            msgBox.innerHTML = '🚙 <b>Salida Registrada.</b><br>Vehículo ' + placa + ' retirado.<br>Celda liberada exitosamente.';
            document.getElementById('placaOut').value = '';
        }
    </script>
</body>
</html>
